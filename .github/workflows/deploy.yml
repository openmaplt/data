name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./patrulis
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Navigate to deployment directory
            cd ${{ secrets.DEPLOY_PATH || '/opt/patrulis' }}
            
            # Create .env file if it doesn't exist
            if [ ! -f .env ]; then
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
              echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
              echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> .env
              echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            fi
            
            # Pull latest docker-compose.prod.yml from the sub-module
            curl -o docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/patrulis/docker-compose.prod.yml
            
            # Login to GitHub Container Registry
            # Get the lowercase repo name for Docker pull
            REPO_NAME_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo ${{ secrets.GHCR_PAT }} | docker login ${{ env.REGISTRY }} -u paumas --password-stdin
            
            # Pull correct image tag
            IMAGE_TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || 'latest' }}
            docker pull ${{ env.REGISTRY }}/${REPO_NAME_LOWER}:${IMAGE_TAG}
            
            # Stop and remove old container
            docker compose -f docker-compose.prod.yml down
            
            # Start new container
            # Update image name to lowercase for docker-compose as well
            sed -i "s|ghcr.io/\${GITHUB_REPOSITORY}:latest|ghcr.io/${REPO_NAME_LOWER}:${IMAGE_TAG}|g" docker-compose.prod.yml
            
            docker compose -f docker-compose.prod.yml up -d
            
            # Clean up old images
            docker image prune -af
            
            # Show container status
            docker compose -f docker-compose.prod.yml ps
