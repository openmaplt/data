services:
  app:
    # This will be replaced by the CI/CD script with the GHCR image name
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: patrulis-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - PORT=3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - patrulis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  patrulis-network:
    driver: bridge
